name: CI

# Build + test + lint gate for pull requests (and pushes to main). This is the
# validation the repo previously lacked — dependency bumps and other PRs now get
# compiled, tested, and linted automatically instead of by hand.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes / Dependabot rebases).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint
